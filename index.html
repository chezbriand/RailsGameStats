<head>
    <title>Game Analyzer</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- <meta http-equiv="Permissions-Policy" content="interest-cohort=()"> -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.3.1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

<body>

    <script>
        // Read the metadata.json file (adjust the path as needed)
        fetch('metadata.json')
            .then(response => response.json())
            .then(metadata => {
                
                // Construct the displayable version string
                const displayableVersion = `${metadata.buildMajor}.${metadata.buildMinor}.${metadata.buildRevision} ${metadata.buildTag}`;
                // Construct the displayable build time string
                const displayableBuildTime = `Build Time: ${metadata.buildTime}`;
                // Update the span element with the version
                document.getElementById('versionDisplay').textContent = displayableVersion + " " + displayableBuildTime;
            })
            .catch(error => console.error('Error reading metadata:', error));
    </script>

    <textarea id="inputArea" rows="10" cols="80" placeholder="Paste Game History here..." autofocus tabindex="1"></textarea><br>
    <span id="gameboardprompt">Game Board: </span>
    
    <select id="startingMoney" onchange="updateValue()" tabindex="2">

        <option value="50">EmpireBuilder</option>

        <option value="40">EmpireBuilderClassic</option>
        <option value="50">EuroRails</option>
        <option value="50">EuroRails2002</option>
        <option value="50">EuroRails2002CardVariant</option>
        <option value="50">EuroRails2002Variant</option>
        <option value="50">EuroRails2009</option>
        <option value="50">IndiaRails</option>

        <option value="60">IronDragon2017</option>

    <script>
    function updateValue() {
        var selectedValue = document.getElementById('startingMoney').value;
        document.getElementById('displayValue').textContent = selectedValue;
    }
    </script>
    
    <button onclick="analyzeGame()" tabindex="3">Analyze</button>
    <div id="stats" style="background-color: rgb(243, 212, 155); padding: 5px;"></div>
    <canvas id="myChart"></canvas>
    <span id="series-picker-wrapper" style="display: none;">
        <label for="series-picker">Chart series: </label>
        <select id="series-picker">
            <option value="money">Money</option>
            <option value="segments">Cumulative Segments Built</option>
            <option value="revenue">Cumulative Load Revenue</option>
            <option value="mileposts">Cumulative Mileposts Moved</option>
        </select>
    </span>
    <button id="toggle-annotations" style="display: none;">Toggle Annotations</button>
    <button id="create-link" style="display: none;">Create Link to Clipboard</button>

    <script>
        
        var myGameChart = null;
        // Results of the most recent analyzeGame() call. Used by the chart-series
        // picker to swap which per-player array is plotted without re-parsing.
        var currentAnalysis = null;

        // Definition of each selectable chart series: which property on each
        // player object holds the per-round cumulative values, plus titles.
        var seriesDef = {
            money:     { title: 'Player Money Each Round',                 yLabel: 'Money',     prop: 'history' },
            segments:  { title: 'Cumulative Segments Built Each Round',    yLabel: 'Segments',  prop: 'segmentsHistory' },
            revenue:   { title: 'Cumulative Load Revenue Each Round',      yLabel: 'Revenue ($)', prop: 'revenueHistory' },
            mileposts: { title: 'Cumulative Mileposts Moved Each Round',   yLabel: 'Mileposts', prop: 'milepostsHistory' }
        };

        // Format a millisecond duration as "Xd Yh", "Yh Zm", "Zm Ws", or "s".
        function formatDuration(ms) {
            if (!isFinite(ms) || ms <= 0) return '—';
            var s = Math.round(ms / 1000);
            var d = Math.floor(s / 86400); s %= 86400;
            var h = Math.floor(s / 3600);  s %= 3600;
            var m = Math.floor(s / 60);    s %= 60;
            var parts = [];
            if (d) parts.push(d + 'd');
            if (h) parts.push(h + 'h');
            if (m && d === 0) parts.push(m + 'm');
            if (!d && !h && !m) parts.push(s + 's');
            return parts.join(' ');
        }

        // Auto-analyze shortly after the user pastes content into the textarea so
        // they don't have to click Analyze for the common copy-paste workflow.
        document.getElementById('inputArea').addEventListener('paste', function() {
            setTimeout(analyzeGame, 100);
        });

        // Swap the currently-plotted series on the chart when the user picks a
        // different one. Re-uses the existing chart instance and the cached
        // analysis result; never re-runs analyzeGame().
        document.getElementById('series-picker').addEventListener('change', function() {
            if (!myGameChart || !currentAnalysis) return;
            var def = seriesDef[this.value] || seriesDef.money;
            var i = 0;
            for (var p in currentAnalysis.players) {
                var src = currentAnalysis.players[p][def.prop];
                if (myGameChart.data.datasets[i]) {
                    myGameChart.data.datasets[i].data = src || [];
                }
                i++;
            }
            myGameChart.options.plugins.title.text = def.title;
            myGameChart.options.scales.y.title.text = def.yLabel;
            myGameChart.update();
        });

        decodeURLParameter('data');

        function parseAmount(action) {
            var match = action.match(/\$(\d+)/);
            return match ? parseInt(match[1]) : 0;
        }

        function parseSegments(action) {
            var match = action.match(/Built (\d+) segments/);
            return match ? parseInt(match[1]) : 0;
        }

        function parseMovement(action) {
            var match = action.match(/Moved (\d+) spaces/);
            return match ? parseInt(match[1]) : 0;
        }

        function decodeURLParameter(param) {
            // Get the encoded data from the URL
            var urlParams = new URLSearchParams(window.location.search);
            var encodedData = urlParams.get(param);

            // Check if the parameter exists
            if (!encodedData) {
                return null;
            }

            // Hide the HTML Elements as this is a URL parameter Graph
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('gameboardprompt').style.display = 'none';
            document.getElementById('startingMoneyPrompt').style.display = 'none';
            document.getElementById('startingMoney').style.display = 'none';
            document.getElementById('displayValue').style.display = 'none';
            document.getElementsByTagName('button')[0].style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('toggle-annotations').style.display = 'none';


            // URL decode the data
            var base64String = decodeURIComponent(encodedData);

            // Decode the base64 string
            var jsonString = atob(base64String);

            // Decompress the JSON string
            // var jsonString = JSON.parse(LZString.decompressFromEncodedURIComponent(encodedData));

            // Convert the JSON string to an object
            var data = JSON.parse(jsonString);

            var players = data.players;
            var rounds = data.rounds;
            //var graphAnnotations = dataObject.graphAnnotations;

            var datasets = [];
            var colors = ['blue', 'red', 'orange', 'yellow', 'green', 'purple', 'black', 'pink'];
            var colorIndex = 0;
            for (var player in players) {
                datasets.push({
                    label: player,
                    data: players[player].history,
                    fill: false,
                    borderColor: colors[colorIndex % colors.length],
                });
                colorIndex++;
            }
            
            var ctx = document.getElementById('myChart').getContext('2d');

            myGameChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rounds[0] === "0" ? rounds : [0].concat(rounds),
                    datasets: datasets,
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Round'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Money'
                            }
                        },
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: 'Player Money Each Round'
                        },
                        tooltip: {
                            callbacks: {
                                footer: function(tooltipItem) {
                                    var round = tooltipItem[0].dataIndex;
                                    return actionsByRound[round];
                                }
                            }
                        }, /*
                        annotation: {
                            annotations: graphAnnotations.map(annotation => ({
                                ...annotation,
                                xMin: annotation.value,
                                xMax: annotation.value,
                                borderColor: annotation.options.borderColor,
                                borderWidth: annotation.options.borderWidth,
                                borderDash: annotation.options.borderDash,
                                label: {
                                    ...annotation.label,
                                    position: 'start',
                                    backgroundColor: 'rgba(0,0,0,0.9)',
                                    content: annotation.label.content,
                                    enabled: true
                                }
                            }))
                        }*/
                    }
                }
            });

        }

        function analyzeGame() {
            var text = document.getElementById('inputArea').value;
            var startingMoney = parseInt(document.getElementById('startingMoney').value);
            var lines = text.trim().split('\n').reverse();

            // Detect the game-start announcement, if present. Newer history files include
            // a line of the form:
            //   "<round>\t\t<GameType> game <GameName> has started. Each player starts with $<N>."
            // (the player field is empty). When found, this overrides whatever the user picked
            // in the Select. The regex is anchored loosely so it also handles a bare line
            // without leading tabs.
            var gameStartRegex = /(\w+)\s+game\s+(\S+)\s+has started\.\s+Each player starts with \$(\d+)\./;
            var detectedGameType = null;
            var detectedGameName = null;
            for (var i = 0; i < lines.length; i++) {
                var gsMatch = lines[i].match(gameStartRegex);
                if (gsMatch) {
                    detectedGameType = gsMatch[1];
                    detectedGameName = gsMatch[2];
                    startingMoney = parseInt(gsMatch[3]);
                    // Sync the Select dropdown to the detected game type, if it matches a known option.
                    var sel = document.getElementById('startingMoney');
                    for (var j = 0; j < sel.options.length; j++) {
                        if (sel.options[j].text === detectedGameType) {
                            sel.selectedIndex = j;
                            break;
                        }
                    }
                    document.getElementById('displayValue').textContent = startingMoney;
                    break;
                }
            }

            var players = {};
            var currentRounds = {};
            var rounds = [];
            var segmentsBuilt = {};
            var segmentsCost = {};
            var loadsDelivered = {};
            var loadsRevenue = {};
            var milepostsMoved = {};
            var actionsByRound = {};
            var timesPitched = {};
            var bribesPaid = {};      // count of bribes paid per player
            var loadsDropped = {};    // count of "Dropped off load" events per player
            // declare an array to record when a player upgrades a train
            var graphAnnotations = []; 

            // Turn-timing state, populated from "Finished Turn on <timestamp>" lines.
            //   turnStats[player] = { totalMs, count, slowestMs, slowestAt }
            // prevFinishMs is the timestamp of the most recent "Finished Turn" line
            // seen (any player); each player's turn duration is the delta from the
            // prior Finished Turn to their own.
            var turnStats = {};
            var prevFinishMs = null;
            var firstFinishMs = null;
            var lastFinishMs = null;
            var slowestTurnGlobal = { player: null, durationMs: 0, when: null };

            // Advance a player's per-round history arrays up through round `r`
            // by pushing the current cumulative values. Used both for the active
            // player and for rent-recipients (who don't otherwise have a line on
            // that round). Keeps history, segmentsHistory, revenueHistory and
            // milepostsHistory in lockstep.
            function advanceTo(p, r) {
                while (currentRounds[p] < r) {
                    players[p].history.push(players[p].money);
                    players[p].segmentsHistory.push(segmentsBuilt[p]);
                    players[p].revenueHistory.push(loadsRevenue[p]);
                    players[p].milepostsHistory.push(milepostsMoved[p]);
                    currentRounds[p]++;
                }
            }

            lines.forEach(line => {
                var parts = line.split('\t');
                // Skip any line that isn't in the standard "round\tplayer\taction" form:
                //   - blank lines / status-block lines without enough tab fields
                //   - the "Round\tPlayer\tMessage" header row some new logs include
                //   - the game-start announcement (has an empty player field; handled above)
                //   - any other line whose round isn't a non-negative integer or whose player is blank
                if (parts.length < 3) return;
                var round = parts[0];
                var player = parts[1];
                var action = parts[2];
                if (!/^\d+$/.test(round) || !player || !player.trim()) return;

                if (!players[player]) {
                    players[player] = {
                        money: startingMoney,
                        history: [],
                        segmentsHistory: [],
                        revenueHistory: [],
                        milepostsHistory: []
                    };
                    currentRounds[player] = null;
                    segmentsBuilt[player] = 0;
                    segmentsCost[player] = 0;
                    loadsDelivered[player] = 0;
                    loadsRevenue[player] = 0;
                    milepostsMoved[player] = 0;
                    timesPitched[player] = 0;
                    bribesPaid[player] = 0;
                    loadsDropped[player] = 0;
                    graphAnnotations[player] = null;
                }

                // account for instances where a player does a NOOP
                // update player to the current round
                advanceTo(player, round);
                
                if (action.startsWith("Built")) {
                    var cost = parseAmount(action);
                    players[player].money -= cost;
                    segmentsBuilt[player] += parseSegments(action);
                    segmentsCost[player] += cost;
                } else if (action.startsWith("Upgraded")) {
                    players[player].money -= parseAmount(action);
                    var playerKeys = Object.keys(players);
                    var playerIndex = playerKeys.indexOf(player);
                    var topLine = 100.0;
                    var spacing = 10.0; // adjust this value to change the spacing
                    var yMin = topLine - (playerIndex * spacing);
                    var yMax = 0;
                    graphAnnotations.push({
                        type: 'line',
                        id: 'vline' + round, // unique id for the annotation
                        options: {
                            borderDash: [2, 2],
                            borderColor: 'black',
                            borderWidth: 2,
                        },
                        value: round,
                        yMin: yMin,
                        yMax: yMax,
                        label: {
                            backgroundColor: 'rgba(0,0,0,0.3)',
                            content: player + ' Upgraded',
                            enabled: true,
                            position: 'start',
                        }
                    });
                } else if (action.startsWith("Player was taxed")) {
                    players[player].money -= parseAmount(action);
                } else if (action.startsWith("Player paid bribe")) {
                    // IronDragon mechanic: bribe an opponent to skip an event etc.
                    // Money out, counted separately in stats.
                    players[player].money -= parseAmount(action);
                    bribesPaid[player] += 1;
                } else if (action.startsWith("Delivered")) {
                    var revenue = parseAmount(action);
                    players[player].money += revenue;
                    loadsDelivered[player] += 1;
                    loadsRevenue[player] += revenue;
                } else if (action.startsWith("Dropped off load")) {
                    // No money impact, but interesting to surface alongside Loads Delivered.
                    loadsDropped[player] += 1;
                } else if (action.startsWith("Moved")) {
                    var movement = parseMovement(action);
                    milepostsMoved[player] += movement;

                    if (action.includes("for rent to")) {
                        var rent = parseAmount(action);
                        players[player].money -= rent;
                        var recipient = action.split("for rent to")[1].trim();
                        if (recipient && recipient in players) {
                            advanceTo(recipient, round);
                            players[recipient].money += rent;                       
                        }
                    }
                } else if (action.startsWith("Pitched")) {
                    timesPitched[player] += 1;
                } else if (action.startsWith("Finished Turn")) {
                    // Newer logs include per-turn timestamps like:
                    //   "Finished Turn on 5/16/2026 6:24:30 PM PDT"
                    // Strip the trailing TZ abbreviation (Date.parse rejects it on some
                    // browsers); since we only care about deltas the absolute TZ is
                    // irrelevant as long as it stays consistent through the file.
                    var tsMatch = action.match(/Finished Turn on (.+?)\s*$/);
                    if (tsMatch) {
                        var tsStr = tsMatch[1].replace(/\s+[A-Z]{2,4}$/, '').trim();
                        var ms = Date.parse(tsStr);
                        if (!isNaN(ms)) {
                            if (firstFinishMs === null) firstFinishMs = ms;
                            lastFinishMs = ms;
                            if (!turnStats[player]) {
                                turnStats[player] = { totalMs: 0, count: 0, slowestMs: 0, slowestAt: null };
                            }
                            if (prevFinishMs !== null) {
                                var dur = ms - prevFinishMs;
                                if (dur >= 0) {
                                    turnStats[player].totalMs += dur;
                                    turnStats[player].count++;
                                    if (dur > turnStats[player].slowestMs) {
                                        turnStats[player].slowestMs = dur;
                                        turnStats[player].slowestAt = ms;
                                    }
                                    if (dur > slowestTurnGlobal.durationMs) {
                                        slowestTurnGlobal.durationMs = dur;
                                        slowestTurnGlobal.player = player;
                                        slowestTurnGlobal.when = ms;
                                    }
                                }
                            }
                            prevFinishMs = ms;
                        }
                    }
                }

                if (!rounds.includes(round)) {
                    rounds.push(round);
                }
                if (!actionsByRound[round]) {
                    actionsByRound[round] = [];
                }
                actionsByRound[round].push(player + " " + action);
            });

            // Add the final money totals for each player
            for (var player in players) {
                advanceTo(player, rounds.length + 1);
            }

            var statsText = "";
            var winner = Object.keys(players).reduce((a, b) => players[a].money > players[b].money ? a : b);
            // $250 exactly is sufficient to win, so use >= here. TODO: derive the
            // win threshold per game-type once we have logs with non-$250 targets.
            var gameIsOver = Object.values(players).some(player => player.money >= 250);

            // Optional game-identity header pulled from the announcement line.
            if (detectedGameName || detectedGameType) {
                statsText += "<strong>Game:</strong> ";
                if (detectedGameName) statsText += detectedGameName;
                if (detectedGameName && detectedGameType) statsText += " &mdash; ";
                if (detectedGameType) statsText += detectedGameType;
                statsText += "<br>";
            }

            if (gameIsOver) {
                statsText += "There were " + (rounds.length) + " rounds, and ";
                statsText += "the winner was " + winner + ".<br>";
            } else {
                statsText += "So far, there have been " + (rounds.length) + " rounds, and ";
                statsText += "the current leader is " + winner + ".<br>";
            }

            // Turn-timing summary (only shown if the log included \"Finished Turn on ...\" lines).
            if (firstFinishMs !== null && lastFinishMs !== null && lastFinishMs > firstFinishMs) {
                statsText += "<strong>Game duration:</strong> " + formatDuration(lastFinishMs - firstFinishMs) + ".<br>";
            }
            if (slowestTurnGlobal.player) {
                statsText += "<strong>Slowest turn:</strong> " + slowestTurnGlobal.player +
                    " took " + formatDuration(slowestTurnGlobal.durationMs) + ".<br>";
            }

            statsText += "<table style='border-spacing: 10px;'><tr><th style='text-align: left;'>Player</th><th style='text-align: left;'>Balance</th><th style='text-align: left;'>Segments<br>Built</th><th style='text-align: left;'>Track<br>Cost</th><th style='text-align: left;'>Loads<br>Delivered</th><th style='text-align: left;'>Loads<br>Dropped</th><th style='text-align: left;'>Load<br>Revenue</th><th style='text-align: left;'>Mileposts<br>Moved</th><th style='text-align: left;'>Times<br>Pitched</th><th style='text-align: left;'>Bribes<br>Paid</th><th style='text-align: left;'>Avg<br>Turn</th><th style='text-align: left;'>Slowest<br>Turn</th><th style='text-align: left;'>Revenue per<br>Segment</th><th style='text-align: left;'>$ Earned per<br>$ Spent</th><th style='text-align: left;'>Mag's Coefficient<br>$ earned / $ spent per segment</th></tr>";
            for (var player in players) {
                var ts = turnStats[player];
                var avgTurnStr = (ts && ts.count > 0) ? formatDuration(ts.totalMs / ts.count) : '—';
                var slowTurnStr = (ts && ts.slowestMs > 0) ? formatDuration(ts.slowestMs) : '—';
                statsText += 
                    "<tr><td style='text-align: left;'>" + player + 
                    "</td><td style='text-align: left;'>$" + players[player].money +
                    "</td><td style='text-align: left;'>" + segmentsBuilt[player] + 
                    "</td><td style='text-align: left;'>$" + segmentsCost[player] + 
                    "</td><td style='text-align: left;'>" + loadsDelivered[player] + 
                    "</td><td style='text-align: left;'>" + loadsDropped[player] + 
                    "</td><td style='text-align: left;'>$" + loadsRevenue[player] + 
                    "</td><td style='text-align: left;'>" + milepostsMoved[player] + 
                    "</td><td style='text-align: left;'>" + timesPitched[player] + 
                    "</td><td style='text-align: left;'>" + bribesPaid[player] + 
                    "</td><td style='text-align: left;'>" + avgTurnStr + 
                    "</td><td style='text-align: left;'>" + slowTurnStr + 
                    "</td><td style='text-align: left;'>$" + (loadsRevenue[player]/segmentsBuilt[player]).toFixed(2) + 
                    "</td><td style='text-align: left;'>" + (loadsRevenue[player]/segmentsCost[player]).toFixed(2) + 
                    "</td><td style='text-align: left;'>" + (loadsRevenue[player]*segmentsBuilt[player]/segmentsCost[player]).toFixed(2) + 
                    "</td></tr>";
            }
            statsText += "</table>";            
            document.getElementById('stats').innerHTML = statsText;

            // Cache the analysis result so the series-picker change handler can
            // swap chart data without re-parsing the input. Keeps the chart fully
            // interactive after a single analyzeGame() call.
            currentAnalysis = { players: players, rounds: rounds };
            // Reset the series picker to Money on each fresh analysis, then reveal it.
            document.getElementById('series-picker').value = 'money';
            document.getElementById('series-picker-wrapper').style.display = 'inline';

            // Convert the data object to a JSON string. Only the money-history is
            // included in the shareable URL to keep links short — the extra
            // per-series arrays (segmentsHistory etc.) live only in memory.
            var serializablePlayers = {};
            for (var p in players) {
                serializablePlayers[p] = { money: players[p].money, history: players[p].history };
            }
            var jsonString = JSON.stringify({
                players: serializablePlayers,
                rounds: rounds,
                //graphAnnotations: graphAnnotations
            });

            // Compress the JSON string
            //var encodedString = LZString.compressToEncodedURIComponent(jsonString);

            // Create a base64 encoded string
            var base64String = btoa(jsonString);

            // URL encode the string to make it safe to include in a URL
            var encodedString = encodeURIComponent(base64String);

            // Create the URL
            var url = window.location.origin + window.location.pathname + "?data=" + encodedString;

            //console.log(jsonString.length, encodedString.length)
            //console.log(jsonString);
            //console.log(JSON.stringify(rounds));
            //console.log(JSON.stringify(datasets));
            //console.log(JSON.stringify(graphAnnotations));
            //console.log(url);
            //console.log('Rounds:', rounds);
            //console.log('Datasets:', datasets);
            //console.log('Graph Annotations:', graphAnnotations);

            var datasets = [];
            var colors = ['blue', 'red', 'orange', 'yellow', 'green', 'purple', 'black', 'pink'];
            var colorIndex = 0;
            for (var player in players) {
                datasets.push({
                    label: player,
                    data: players[player].history,
                    fill: false,
                    borderColor: colors[colorIndex % colors.length],
                });
                colorIndex++;
            }
            
            var ctx = document.getElementById('myChart').getContext('2d');
            if (myGameChart) {
                myGameChart.destroy();
            }

            myGameChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: rounds[0] === "0" ? rounds : [0].concat(rounds),
                    datasets: datasets,
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Round'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Money'
                            }
                        },
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: 'Player Money Each Round'
                        },
                        tooltip: {
                            callbacks: {
                                footer: function(tooltipItem) {
                                    var round = tooltipItem[0].dataIndex;
                                    return actionsByRound[round];
                                }
                            }
                        },
                        annotation: {
                            annotations: graphAnnotations.map(annotation => ({
                                ...annotation,
                                xMin: annotation.value,
                                xMax: annotation.value,
                                borderColor: annotation.options.borderColor,
                                borderWidth: annotation.options.borderWidth,
                                borderDash: annotation.options.borderDash,
                                label: {
                                    ...annotation.label,
                                    position: 'start',
                                    backgroundColor: 'rgba(0,0,0,0.9)',
                                    content: annotation.label.content,
                                    enabled: true
                                }
                            }))
                        }
                    }
                }
            });
        
            var showAnnotations = true;
            document.getElementById('toggle-annotations').style.display = 'block';
            document.getElementById('create-link').style.display = 'block';

            // Saves the url to the clipboard
            document.getElementById('create-link').addEventListener('click', function() {

                // Use the TinyUrl API to shorten the URL

                // Define the original URL you want to shorten
                const originalUrl = url;

                // Construct the TinyURL API endpoint
                const apiUrl = 'https://api.tinyurl.com/create';

                // Create an object with the necessary data for the request
                const requestData = {
                url: originalUrl,
                domain: 'tinyurl.com',
                };

                // Make a POST request to the TinyURL API
                fetch(apiUrl, {
                method: 'POST',
                body: JSON.stringify(requestData),
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: 'Bearer 9Ui6ZJyRp4OIo5YAzL2ppVtXSS8DtMnqPXebJNI3ZJstKFcxp3KnnAZP02wU', 
                },
                })
                .then((response) => response.json())
                .then((data) => {
                    // Handle the response data
                    if (data && data.data && data.data.tiny_url) {
                        console.log('Shortened URL:', data.data.tiny_url);
                        var el = document.createElement('textarea');
                        el.value = data.data.tiny_url;
                        document.body.appendChild(el);
                        el.select();
                        document.execCommand('copy');
                        document.body.removeChild(el);
                    } else {
                        console.error('Error creating shortened URL');
                    }
                })
                .catch((error) => {
                    console.error('An error occurred:', error);
                });


            });

            // Toggles the visibility of the annotations
            document.getElementById('toggle-annotations').addEventListener('click', function() {
                showAnnotations = !showAnnotations;
                myGameChart.options.plugins.annotation.annotations.forEach(function(annotation) {
                    annotation.display = showAnnotations;
                });
                myGameChart.update();
            });
        }
    </script>
